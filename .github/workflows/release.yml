name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  verify-version:
    # Fails fast if the git tag's version (e.g. `v0.4.3`) doesn't match
    # `version = "..."` in Cargo.toml. Prevents shipping a binary whose
    # baked-in CARGO_PKG_VERSION disagrees with the release label.
    name: Verify tag matches Cargo.toml version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compare versions
        run: |
          CARGO_VERSION=$(grep -E '^version = ' Cargo.toml | head -1 | cut -d'"' -f2)
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "Cargo.toml: $CARGO_VERSION"
          echo "Git tag:    $TAG_VERSION"
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Cargo.toml version ($CARGO_VERSION) does not match tag ($TAG_VERSION). Bump Cargo.toml and commit before tagging."
            exit 1
          fi

  build-windows:
    name: Build Windows release binary
    needs: verify-version
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      # cargo-xwin invokes `clang-cl` (provided by the `clang` package; it
      # symlinks to `clang` and switches to MSVC mode based on argv[0]).
      # `llvm` provides `llvm-rc-NN` which build.rs uses to compile the
      # .exe icon resource.
      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y clang llvm

      # The xwin SDK download is several hundred MB — cache it across
      # CI runs so we only pay the cost on the first run after a key bust.
      - name: Cache xwin SDK
        uses: actions/cache@v4
        with:
          path: ~/.cache/cargo-xwin
          key: cargo-xwin-ubuntu-latest-v1

      - name: Install cargo-xwin
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-xwin

      - name: Build binary
        run: cargo xwin build --release --target x86_64-pc-windows-msvc

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: inari-x86_64-pc-windows-msvc
          path: target/x86_64-pc-windows-msvc/release/Inari.exe

  release:
    name: Create GitHub Release
    needs: build-windows
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/inari-x86_64-pc-windows-msvc/Inari.exe
            assets/icon.png
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
